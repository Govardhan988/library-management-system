{% extends 'base.html' %}

{% block content %}

<h1>Add Book</h1>

<form method="POST">

    <label>Book Title</label>
    <input type="text" name="title" required>

    <label>Author</label>
    <input type="text" name="author" required>

    <label>Quantity</label>
    <input type="number" name="quantity" required>

    <button type="submit">Save Book</button>

</form>

{% endblock %}
