{% extends 'base.html' %}

{% block content %}

<h1>Library Books</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Quantity</th>
        <th>Action</th>
    </tr>

    {% for book in books %}
    <tr>
        <td>{{ book.id }}</td>
        <td>{{ book.title }}</td>
        <td>{{ book.author }}</td>
        <td>{{ book.quantity }}</td>
        <td>
            <a href="/delete/{{ book.id }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
